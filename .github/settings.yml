# Declarative repository settings.
# Applied automatically if the "Settings" GitHub App is installed
# (https://github.com/apps/settings); otherwise this documents the intended
# About metadata. The live values are also set via `gh repo edit`.
repository:
  name: next-url-shortener
  description: "Cut — a tiny, self-hosted URL shortener on Next.js + Upstash Redis. Owner-only admin with password-protected, expiring, and click-capped links. One-click deploy to Vercel."
  homepage: https://s.mendy-landa.dev
  topics: url-shortener, link-shortener, nextjs, react, typescript, tailwindcss, vercel, upstash, redis, serverless, self-hosted
  has_issues: true
  has_projects: false
  has_wiki: false
  default_branch: main
  allow_squash_merge: true
  delete_branch_on_merge: true
