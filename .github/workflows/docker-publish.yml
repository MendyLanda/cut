name: Publish Docker image

# Builds the self-hosted Cut image and pushes it to the GitHub Container
# Registry (ghcr.io/mendylanda/cut). The Coolify and Dokploy one-click
# templates pull this image. Runs on pushes to main, on semver release tags,
# and on demand.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so MendyLanda/cut
          # becomes ghcr.io/mendylanda/cut.
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
