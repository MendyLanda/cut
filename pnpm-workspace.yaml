# Dependency build-script approvals. esbuild needs its install script to fetch
# the native binary (used by the `build:node` bundle step). The rest are
# transitive dev-only native deps we never run, so their builds are disabled.
allowBuilds:
  '@parcel/watcher': false
  esbuild: true
  sharp: false
  unrs-resolver: false
  workerd: false
